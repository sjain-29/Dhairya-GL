<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Dhairya Blessing Ceremony</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold:       #C9952A;
      --gold-lt:    #E8BA5A;
      --gold-pale:  #FBF0D8;
      --cream:      #FDFAF4;
      --ink:        #1A1207;
      --ink-soft:   #5C4D35;
      --ink-muted:  #9C8A6E;
      --surface:    #FFFFFF;
      --border:     #EAD9B8;
      --green:      #2D7A4F;
      --green-pale: #E6F4EC;
      --green-bdr:  #A0D5B5;
      --red:        #B84040;
      --sh-sm:      0 1px 4px rgba(26,18,7,.08);
      --sh-md:      0 4px 20px rgba(26,18,7,.13);
      /* safe area insets for iPhone notch/home bar */
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100dvh;
      overflow-x: hidden;
      /* bottom nav height + safe area */
      padding-bottom: calc(72px + var(--safe-bottom));
    }

    /* ── Soft radial bg ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 10% -5%, rgba(201,149,42,.10) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 90% 105%, rgba(201,149,42,.07) 0%, transparent 55%);
    }

    /* ══════════════════════════════════════
       STICKY HEADER
    ══════════════════════════════════════ */
    #app-header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(253,250,244,.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1.5px solid var(--border);
      padding: calc(var(--safe-top) + 14px) 16px 0;
      box-shadow: var(--sh-sm);
    }

    /* Title row */
    .hdr-row1 {
      padding-bottom: 10px;
    }

    .title-block h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      line-height: 1.15;
      color: var(--ink);
    }
    .title-block p {
      font-size: 0.68rem;
      color: var(--ink-muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Live dot (used in stat cards) */
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }

    /* ── Stat cards row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding-bottom: 12px;
    }
    .stat-card {
      border-radius: 14px;
      padding: 10px 10px 9px;
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
      border: 1.5px solid transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s, box-shadow .15s;
    }
    .stat-card:active { transform: scale(.94); }

    .stat-card.total {
      background: var(--ink); border-color: var(--ink);
    }
    .stat-card.arrived {
      background: var(--green-pale); border-color: var(--green-bdr);
    }
    .stat-card.pending {
      background: #FFF7E6; border-color: #F0D080;
    }

    .stat-label {
      font-size: .6rem; font-weight: 600;
      letter-spacing: .09em; text-transform: uppercase;
      display: flex; align-items: center; gap: 4px;
    }
    .stat-card.total   .stat-label { color: rgba(255,255,255,.65); }
    .stat-card.arrived .stat-label { color: var(--green); }
    .stat-card.pending .stat-label { color: #996600; }

    .stat-num {
      font-size: 1.55rem; font-weight: 600; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-card.total   .stat-num { color: #fff; }
    .stat-card.arrived .stat-num { color: var(--green); }
    .stat-card.pending .stat-num { color: #7A5000; }

    .stat-sub {
      font-size: .6rem; font-weight: 500;
      margin-top: 1px;
    }
    .stat-card.total   .stat-sub { color: rgba(255,255,255,.45); }
    .stat-card.arrived .stat-sub { color: rgba(45,122,79,.55); }
    .stat-card.pending .stat-sub { color: rgba(122,80,0,.5); }

    /* live dot inside total card */
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold-lt);
      animation: blink 2s infinite;
      flex-shrink: 0;
      display: inline-block;
    }

    /* Search row */
    .hdr-row2 {
      padding-bottom: 12px;
      position: relative;
    }
    .hdr-row2 .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--ink-muted); pointer-events: none;
      width: 18px; height: 18px;
    }
    #search-input {
      width: 100%; height: 48px;
      padding: 0 44px 0 44px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; color: var(--ink);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search-input::placeholder { color: var(--ink-muted); }
    #search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,149,42,.15);
    }
    .search-clear {
      display: none;
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--border); border: none; cursor: pointer;
      align-items: center; justify-content: center;
      color: var(--ink-soft);
      -webkit-tap-highlight-color: transparent;
    }
    .search-clear.visible { display: flex; }

    /* Filter tabs */
    .hdr-row3 {
      display: flex; gap: 8px;
      padding-bottom: 12px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .hdr-row3::-webkit-scrollbar { display: none; }

    .filter-tab {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: .8rem; font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--ink-soft);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, border-color .15s, color .15s;
    }
    .filter-tab.active {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }
    .filter-tab.active.green { background: var(--green); border-color: var(--green); }
    .filter-tab.active.gold  { background: var(--gold);  border-color: var(--gold);  }

    /* ══════════════════════════════════════
       GUEST LIST
    ══════════════════════════════════════ */
    #guest-list-container {
      position: relative; z-index: 1;
      padding: 8px 12px 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    /* Alpha group heading */
    .group-heading {
      font-family: 'Playfair Display', serif;
      font-size: .78rem;
      color: var(--gold);
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 18px 4px 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      user-select: none;
    }

    /* ── Guest row ── */
    .guest-item {
      display: flex; align-items: stretch;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      margin-bottom: 7px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .18s, background .18s, transform .12s, box-shadow .18s;
      min-height: 62px;            /* fat finger friendly */
    }
    .guest-item:active { transform: scale(.975); }

    .guest-item.checked {
      background: var(--green-pale);
      border-color: var(--green-bdr);
    }
    .guest-item.hl {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,149,42,.18);
    }

    /* Checkbox column */
    .chk-col {
      display: flex; align-items: center; justify-content: center;
      padding: 0 0 0 16px;
      flex-shrink: 0;
    }
    .chk-box {
      width: 30px; height: 30px; border-radius: 10px;
      border: 2.5px solid var(--border);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .18s, border-color .18s, transform .15s;
    }
    .guest-item.checked .chk-box {
      background: var(--green);
      border-color: var(--green);
      transform: scale(1.08);
    }
    .chk-box svg { opacity: 0; transition: opacity .15s; }
    .guest-item.checked .chk-box svg { opacity: 1; }

    /* Name column */
    .name-col {
      flex: 1;
      display: flex; flex-direction: column; justify-content: center;
      padding: 12px 14px 12px 12px;
      gap: 2px;
    }
    .guest-name {
      font-size: 1rem; font-weight: 500;
      color: var(--ink);
      line-height: 1.3;
      transition: color .18s;
    }
    .guest-item.checked .guest-name {
      color: var(--green);
      text-decoration: line-through;
      text-decoration-color: rgba(45,122,79,.4);
    }
    .guest-serial {
      font-size: .7rem; color: var(--ink-muted);
      font-variant-numeric: tabular-nums;
    }

    /* Arrived badge */
    .arrived-badge {
      display: none;
      flex-shrink: 0;
      align-self: center;
      margin-right: 14px;
      font-size: .68rem; font-weight: 600; letter-spacing: .04em;
      color: var(--green);
      background: #c8ebd6;
      border-radius: 100px;
      padding: 3px 9px;
    }
    .guest-item.checked .arrived-badge { display: block; }

    /* ══════════════════════════════════════
       STATES
    ══════════════════════════════════════ */
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 48px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #empty-state {
      text-align: center; padding: 64px 24px;
      display: none;
    }
    #empty-state .emoji { font-size: 3rem; margin-bottom: 14px; }
    #empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; margin-bottom: 8px;
    }
    #empty-state p { font-size: .88rem; color: var(--ink-muted); line-height: 1.65; }

    #no-results {
      display: none; text-align: center; padding: 48px 24px;
      color: var(--ink-muted); font-size: .9rem;
    }
    #no-results strong { color: var(--ink); }

    /* ══════════════════════════════════════
       BOTTOM NAV (thumb zone)
    ══════════════════════════════════════ */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 300;
      background: rgba(253,250,244,.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1.5px solid var(--border);
      padding: 10px 16px calc(10px + var(--safe-bottom));
      display: flex; gap: 10px;
    }
    #file-input { display: none; }

    .nav-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      padding: 10px 6px;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem; font-weight: 600;
      border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .12s;
      letter-spacing: .01em;
    }
    .nav-btn:active { transform: scale(.93); }
    .nav-btn svg { flex-shrink: 0; }

    .nav-btn-primary {
      background: var(--gold);
      color: #fff;
      box-shadow: 0 3px 12px rgba(201,149,42,.38);
    }
    .nav-btn-ghost {
      background: var(--surface);
      color: var(--ink-soft);
      border: 1.5px solid var(--border);
    }
    .nav-btn-red {
      background: #fff3f3;
      color: var(--red);
      border: 1.5px solid #f5cece;
    }

    /* ══════════════════════════════════════
       UPLOAD OVERLAY
    ══════════════════════════════════════ */
    #upload-overlay {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(253,250,244,.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #upload-overlay.active { display: flex; }
    #upload-overlay p { font-family: 'Playfair Display', serif; font-size: 1.15rem; }
    #upload-overlay small { color: var(--ink-muted); font-size: .82rem; }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: calc(88px + var(--safe-bottom));
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--ink); color: #fff;
      font-size: .85rem; font-weight: 500;
      padding: 11px 22px;
      border-radius: 100px;
      box-shadow: var(--sh-md);
      z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .22s, transform .22s;
      white-space: nowrap; max-width: calc(100vw - 32px);
      text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════
       SCROLL-TO-TOP FAB
    ══════════════════════════════════════ */
    #fab-top {
      position: fixed;
      right: 16px;
      bottom: calc(82px + var(--safe-bottom));
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--ink); color: #fff;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--sh-md);
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 250;
      -webkit-tap-highlight-color: transparent;
    }
    #fab-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     STICKY HEADER
═══════════════════════════════════════════ -->
<header id="app-header">
  <!-- Row 1: title -->
  <div class="hdr-row1">
    <div class="title-block">
      <h1>Dhairya Blessing Ceremony</h1>
      <p>Live Guest Check-In</p>
    </div>
  </div>

  <!-- Row 1b: stat cards -->
  <div class="stats-row">
    <div class="stat-card total" onclick="setFilter('all', document.querySelector('[data-filter=all]'))">
      <span class="stat-label"><span class="live-dot"></span> Total</span>
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-sub">guests</span>
    </div>
    <div class="stat-card arrived" onclick="setFilter('arrived', document.querySelector('[data-filter=arrived]'))">
      <span class="stat-label">✓ Arrived</span>
      <span class="stat-num" id="stat-arrived">0</span>
      <span class="stat-sub">checked in</span>
    </div>
    <div class="stat-card pending" onclick="setFilter('pending', document.querySelector('[data-filter=pending]'))">
      <span class="stat-label">⏳ Pending</span>
      <span class="stat-num" id="stat-pending">0</span>
      <span class="stat-sub">awaited</span>
    </div>
  </div>

  <!-- Row 2: search -->
  <div class="hdr-row2">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search-input" type="search" placeholder="Search by name…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search" />
    <button class="search-clear" id="search-clear" aria-label="Clear search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Row 3: filter tabs -->
  <div class="hdr-row3">
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" data-filter="pending" onclick="setFilter('pending',this)">⏳ Pending</button>
    <button class="filter-tab active green" data-filter="arrived" onclick="setFilter('arrived',this)" style="display:none">✓ Arrived</button>
    <button class="filter-tab" data-filter="arrived" onclick="setFilter('arrived',this)">✓ Arrived</button>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     MAIN LIST
═══════════════════════════════════════════ -->
<main id="guest-list-container">
  <div id="loading-spinner" class="spinner"></div>
  <div id="empty-state">
    <div class="emoji">🪷</div>
    <h3>No guests yet</h3>
    <p>Tap <strong>Upload List</strong> below to import your Excel or CSV file of guest names.</p>
  </div>
  <div id="no-results">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 10px;display:block">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    No results for <strong id="no-results-term"></strong>
  </div>
  <div id="guest-list"></div>
</main>

<!-- ═══════════════════════════════════════════
     BOTTOM NAV
═══════════════════════════════════════════ -->
<nav id="bottom-nav">
  <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />

  <button class="nav-btn nav-btn-primary" onclick="document.getElementById('file-input').click()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Upload List
  </button>

  <button class="nav-btn nav-btn-ghost" onclick="exportToCSV()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Export
  </button>

  <button class="nav-btn nav-btn-red" onclick="uncheckAll()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    Reset
  </button>
</nav>

<!-- Scroll to top FAB -->
<button id="fab-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<!-- Upload overlay -->
<div id="upload-overlay">
  <div class="spinner"></div>
  <p>Syncing to Firebase…</p>
  <small id="upload-label">Preparing…</small>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════ -->
<script>
/* ── Firebase Config ──────────────────────────────────────
   Fill in YOUR values below. databaseURL is already set.
──────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_AUTH_DOMAIN",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId:             "YOUR_APP_ID",
  databaseURL:       "https://dhairya-gl-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db        = firebase.database();
const guestsRef = db.ref('guests');

/* ── State ────────────────────────────────────────────── */
let allGuests   = {};
let searchQuery = '';
let activeFilter = 'all';   // 'all' | 'pending' | 'arrived'

/* ── DOM refs ─────────────────────────────────────────── */
const guestListEl    = document.getElementById('guest-list');
const emptyStateEl   = document.getElementById('empty-state');
const loadingEl      = document.getElementById('loading-spinner');
const noResultsEl    = document.getElementById('no-results');
const searchInput    = document.getElementById('search-input');
const searchClearBtn = document.getElementById('search-clear');
const fileInput      = document.getElementById('file-input');
const uploadOverlay  = document.getElementById('upload-overlay');
const uploadLabel    = document.getElementById('upload-label');
const fabTop         = document.getElementById('fab-top');

/* ── Firebase real-time listener ─────────────────────── */
guestsRef.on('value', snap => {
  loadingEl.style.display = 'none';
  allGuests = snap.val() || {};
  renderList();
  updateCounter();
});

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderList() {
  const q = searchQuery.trim().toLowerCase();

  let entries = Object.entries(allGuests)
    .map(([key, v]) => ({ key, name: v.name, checked: !!v.checked }))
    .sort((a, b) => a.name.localeCompare(b.name, 'en', { sensitivity: 'base' }));

  // Filter tab
  if (activeFilter === 'pending')  entries = entries.filter(e => !e.checked);
  if (activeFilter === 'arrived')  entries = entries.filter(e =>  e.checked);

  // Search
  const filtered = q ? entries.filter(e => e.name.toLowerCase().includes(q)) : entries;

  // States
  const totalAll = Object.keys(allGuests).length;
  if (totalAll === 0) {
    emptyStateEl.style.display = 'block';
    noResultsEl.style.display  = 'none';
    guestListEl.innerHTML = '';
    return;
  }
  emptyStateEl.style.display = 'none';

  if (filtered.length === 0) {
    noResultsEl.style.display = 'block';
    document.getElementById('no-results-term').textContent =
      q ? `"${searchQuery.trim()}"` : `"${activeFilter}"`;
    guestListEl.innerHTML = '';
    return;
  }
  noResultsEl.style.display = 'none';

  let html = '';
  let curLetter = '';
  let serial = 0;

  filtered.forEach(g => {
    serial++;
    const letter = g.name[0].toUpperCase();
    if (letter !== curLetter) {
      curLetter = letter;
      html += `<div class="group-heading">${letter}</div>`;
    }

    const cc  = g.checked ? ' checked' : '';
    const hlc = (q && g.name.toLowerCase().includes(q)) ? ' hl' : '';
    const displayName = q
      ? highlightName(escapeHtml(g.name), q)
      : escapeHtml(g.name);

    html += `
    <div class="guest-item${cc}${hlc}" onclick="toggleGuest('${g.key}',${!g.checked})">
      <div class="chk-col">
        <div class="chk-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <div class="name-col">
        <span class="guest-name">${displayName}</span>
        <span class="guest-serial">#${String(serial).padStart(3,'0')}</span>
      </div>
      <span class="arrived-badge">Arrived</span>
    </div>`;
  });

  guestListEl.innerHTML = html;
}

function highlightName(name, q) {
  const i = name.toLowerCase().indexOf(q);
  if (i === -1) return name;
  return name.slice(0, i)
    + `<mark style="background:rgba(201,149,42,.28);border-radius:3px;padding:0 1px">${name.slice(i, i + q.length)}</mark>`
    + name.slice(i + q.length);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

/* ── Counter ──────────────────────────────────────────── */
function updateCounter() {
  const vals    = Object.values(allGuests);
  const total   = vals.length;
  const arrived = vals.filter(v => v.checked).length;
  const pending = total - arrived;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-arrived').textContent = arrived;
  document.getElementById('stat-pending').textContent = pending;
}

/* ── Toggle guest ─────────────────────────────────────── */
function toggleGuest(key, newVal) {
  guestsRef.child(key).update({ checked: newVal });
  if (allGuests[key]) {
    allGuests[key].checked = newVal;
    renderList();
    updateCounter();
  }
  // Haptic feedback on iOS/Android if supported
  if (navigator.vibrate) navigator.vibrate(30);
}

/* ── Filter tabs ──────────────────────────────────────── */
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active','green','gold'));
  el.classList.add('active');
  if (f === 'arrived') el.classList.add('green');
  renderList();
}

/* ── Search ───────────────────────────────────────────── */
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  searchClearBtn.classList.toggle('visible', searchQuery.length > 0);
  renderList();
});
searchClearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClearBtn.classList.remove('visible');
  searchInput.focus();
  renderList();
});

/* ── Scroll-to-top FAB ────────────────────────────────── */
window.addEventListener('scroll', () => {
  fabTop.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });

/* ══════════════════════════════════════════════════════
   FILE UPLOAD
══════════════════════════════════════════════════════ */
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  fileInput.value = '';

  const reader = new FileReader();
  reader.onload = evt => {
    try {
      let names = [];
      if (file.name.toLowerCase().endsWith('.csv')) {
        names = parseCSV(evt.target.result);
      } else {
        const wb  = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
        const ws  = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        rows.forEach(row => row.forEach(cell => {
          const v = String(cell || '').trim();
          if (v) names.push(v);
        }));
      }

      names = [...new Set(names.filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'en', { sensitivity: 'base' }));

      if (!names.length) { showToast('No names found in file.'); return; }

      if (confirm(`Upload ${names.length} guests?\n\nThis will replace the current list.`)) {
        pushToFirebase(names);
      }
    } catch (err) {
      console.error(err);
      showToast('Could not parse file. Check format.');
    }
  };
  file.name.toLowerCase().endsWith('.csv')
    ? reader.readAsText(file)
    : reader.readAsArrayBuffer(file);
});

function parseCSV(text) {
  const names = [];
  text.split(/\r?\n/).forEach(row => {
    row.split(',').forEach(cell => {
      const v = cell.replace(/^["']|["']$/g, '').trim();
      if (v) names.push(v);
    });
  });
  return names;
}

async function pushToFirebase(names) {
  uploadOverlay.classList.add('active');
  uploadLabel.textContent = `Uploading ${names.length} guests…`;
  try {
    const batch = {};
    names.forEach(name => {
      batch[guestsRef.push().key] = { name, checked: false };
    });
    await guestsRef.set(batch);
    uploadOverlay.classList.remove('active');
    showToast(`✓ ${names.length} guests uploaded!`);
  } catch (err) {
    uploadOverlay.classList.remove('active');
    console.error(err);
    showToast('Upload failed — check Firebase config & rules.');
  }
}

/* ── Uncheck all ──────────────────────────────────────── */
async function uncheckAll() {
  const n = Object.values(allGuests).filter(g => g.checked).length;
  if (!n) { showToast('Nothing to reset.'); return; }
  if (!confirm(`Reset ${n} checked guest${n>1?'s':''}?`)) return;
  const upd = {};
  Object.keys(allGuests).forEach(k => { upd[`${k}/checked`] = false; });
  await guestsRef.update(upd);
  showToast('All guests reset.');
}

/* ── Export CSV ───────────────────────────────────────── */
function exportToCSV() {
  const rows = Object.values(allGuests).sort((a,b) => a.name.localeCompare(b.name));
  if (!rows.length) { showToast('No guests to export.'); return; }
  const csv = ['Name,Status',
    ...rows.map(g => `"${g.name}",${g.checked ? 'Arrived' : 'Pending'}`)
  ].join('\n');
  const a   = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
    download: 'dhairya_guests.csv'
  });
  a.click();
  showToast('CSV exported!');
}

/* ── Toast ────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
